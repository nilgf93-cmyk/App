<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kondry Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --amber:#E8873A;
      --amber-dim:rgba(232,135,58,0.18);
      --amber-border:rgba(232,135,58,0.35);
      --gold:#c8922a;
      --dark:#0f0d0b;
      --dark2:#181410;
      --dark3:#221d17;
      --text:#f0ece6;
      --text-dim:rgba(240,236,230,0.5);
      --text-faint:rgba(240,236,230,0.25);
      --green:#4caf7d;
      --red:#e05252;
    }
    body{display:flex;width:100%;height:100vh;height:100dvh;margin:0;padding:0;background:#0f0d0b;font-family:'DM Sans',sans-serif;overflow:hidden}
    .phone{width:100%;max-width:430px;height:100vh;height:100dvh;border-radius:0;overflow:hidden;position:relative;z-index:1;filter:brightness(1.35) contrast(1.05);margin:0 auto}
    @media (max-width:768px){
      body{align-items:flex-start;background:#0f0d0b}
      .phone{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;filter:brightness(1.35) contrast(1.05)}
    }
    .screen{display:none;height:100%;overflow-y:auto;overflow-x:hidden;flex-direction:column;position:relative;z-index:1}
    .screen.active{display:flex}
    .screen::-webkit-scrollbar{display:none}

    .status-bar{padding-top:env(safe-area-inset-top, 16px)}
    .f-footer{padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px))}
    .l-footer{padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px))}
    .s-body{padding-bottom:env(safe-area-inset-bottom, 0px)}
    .status-bar{display:flex;justify-content:space-between;align-items:center;padding:env(safe-area-inset-top, 16px) 28px 0;padding-top:max(env(safe-area-inset-top), 16px);flex-shrink:0;position:relative;z-index:2;color:rgba(240,236,230,0.4)}
    .sb-time{font-size:14px;font-weight:500;letter-spacing:.5px;display:none}
    .sb-bar{display:none}

    .btn-cta:active{transform:scale(.98);opacity:.88}

    #screen-form{filter:brightness(1.5) contrast(1.02)}
    #screen-form::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.15) 45%,rgba(0,0,0,0.25) 100%);z-index:0;pointer-events:none}
    .f-header{padding:12px 28px 20px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(12,10,8,0.35);position:relative;z-index:2}
    .f-header-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
    .back-btn{width:34px;height:34px;border-radius:50%;background:rgba(34,29,23,0.8);border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-dim);line-height:1}
    .f-screen-label{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber)}
    .f-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--text);letter-spacing:1px;line-height:1}
    .f-body{padding:24px 28px;flex:1;overflow-y:auto;background:rgba(10,8,6,0.15);position:relative;z-index:2}
    .f-body::-webkit-scrollbar{display:none}
    .field{margin-bottom:20px}
    .field label{display:block;font-size:10px;font-weight:500;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
    .field input{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:rgba(30,22,14,0.85);outline:none;transition:border-color .2s}
    .field input::placeholder{color:var(--text-faint)}
    .field select{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:rgba(30,22,14,0.85);outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none;cursor:pointer}
    .field select:focus{border-color:var(--amber)}
    .field select.error{border-color:var(--red)}
    .field select.ok{border-color:var(--green)}
    .field select option{background:#221d17;color:var(--text)}
    .field input:focus{border-color:var(--amber)}
    .field input.error{border-color:var(--red)}
    .field input.ok{border-color:var(--green)}
    .field-hint{margin-top:5px;font-size:11px;display:none}
    .field-hint.show{display:block}
    .field-hint.error{color:var(--red)}
    .f-footer{padding:16px 28px 32px;background:rgba(10,8,6,0.15);position:relative;z-index:2}
    .btn-submit{width:100%;padding:19px;background:rgba(212,168,67,0.45);color:rgba(20,12,0,0.9);border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:opacity .2s,transform .1s}

        <button class="back-btn" onclick="navigate('screen-welcome')">&#8249;</button>
        <span class="f-screen-label">Registro</span>
      </div>
      <div class="f-title">TUS DATOS</div>
    </div>
    <div class="f-body">
      <div class="field"><label>Nombre completo</label><input id="f-nombre" type="text" placeholder="Nombre y apellido" oninput="vf(this,'nombre')"/><div class="field-hint" id="h-nombre"></div></div>
      <div class="field"><label>Correo electrónico</label><input id="f-mail" type="email" placeholder="email@ejemplo.com" oninput="vf(this,'mail')"/><div class="field-hint" id="h-mail"></div></div>
      <div class="field"><label>Teléfono</label><input id="f-tel" type="tel" placeholder="+34 612 345 678" oninput="vf(this,'tel')"/><div class="field-hint" id="h-tel"></div></div>
      <div class="field"><label>Ciudad</label><input id="f-ciudad" type="text" placeholder="Tu ciudad" oninput="vf(this,'ciudad')"/><div class="field-hint" id="h-ciudad"></div></div>
      <div class="field"><label>Deporte principal</label><select id="f-deporte" onchange="onDeporteChange(this)"><option value="" disabled selected>Selecciona tu deporte</option><option value="Ciclismo">Ciclismo</option><option value="Trail/Running">Trail / Running</option><option value="Triatlón">Triatlón</option><option value="Natación">Natación</option><option value="Weightlifting">Weightlifting</option><option value="Otros">Otros</option></select><div id="otros-wrap" style="display:none;margin-top:10px"><input id="f-deporte-otros" type="text" placeholder="¿Cuál es tu deporte?" oninput="vfOtros(this)"/></div><div class="field-hint" id="h-deporte"></div></div>
    </div>
    <div class="f-footer">
      <button class="btn-submit" onclick="submitForm()">ENVIAR</button>
    </div>
  </div>

  <!-- CONFIRMACIÓN -->
  <div id="screen-success" class="screen">
    <div class="status-bar"><span class="sb-time">9:41</span></div>
    <div class="s-body">
      <div class="s-check">&#10003;</div>
      <div class="s-title">LISTO,<br><span>ATLETA.</span></div>
      <div class="s-sub">Acabas de unirte a los que no se conforman.</div>
      <span id="sd-nombre" style="display:none"></span>
      <span id="sd-mail" style="display:none"></span>
      <span id="sd-tel" style="display:none"></span>
      <span id="sd-ciudad" style="display:none"></span>
      <span id="sd-deporte" style="display:none"></span>
    </div>
  </div>

  <!-- PARTICIPANTES -->
  <div id="screen-list" class="screen">
    <div class="status-bar" style="position:relative;z-index:2"><span class="sb-time">9:41</span></div>
    <div class="l-header">
      <div class="l-title">PARTICIPANTES</div>
      <div class="search-box">
        <span style="font-size:13px;color:var(--text-faint)">&#9901;</span>
        <input type="text" placeholder="Buscar por nombre" oninput="filterList(this.value)"/>
      </div>
    </div>
    <div class="l-body" id="list-body"></div>
    <div class="l-footer">
      <button class="btn-new" onclick="navigate('screen-form')">NUEVO REGISTRO</button>
    </div>
  </div>

</div>
<script>
  var SHEET_URL = 'https://script.google.com/macros/s/AKfycbwzYKUKqEO7_9Ln7YkkT8-j1Z5xNxSQrGPFjno6ztm-bcsyhkPPzjKnObcfig-MgIRM/exec';
  var participants = [
    {nombre:'Ana Martínez',id:'001'},
    {nombre:'Carlos Pérez',id:'002'},
    {nombre:'María López',id:'003'}
  ];

  function navigate(id) {
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
    document.getElementById(id).classList.add('active');
    document.getElementById(id).scrollTop = 0;
    if (id === 'screen-list') renderList(participants);
  }

  function initials(n) {
    var p = n.trim().split(' ');
    return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
  }

  function renderList(data) {
    var el = document.getElementById('list-body');
    if (!data.length) { el.innerHTML = '<div style="padding:40px 28px;text-align:center;color:rgba(240,236,230,0.25);font-size:14px;">Sin resultados</div>'; return; }
    el.innerHTML = data.map(function(p) {
      return '<div class="participant"><div class="p-avatar">' + initials(p.nombre) + '</div><div class="p-name">' + p.nombre + '</div><div class="p-id">#' + p.id + '</div></div>';
    }).join('');
  }

  function filterList(q) {
    renderList(participants.filter(function(p){ return p.nombre.toLowerCase().includes(q.toLowerCase()); }));
  }

  var validators = {
    nombre: function(v) { if (!v) return {ok:false,msg:'Requerido'}; if (v.trim().split(' ').length < 2) return {ok:false,msg:'Nombre y apellido'}; return {ok:true,msg:''}; },
    mail:   function(v) { if (!v) return {ok:false,msg:'Requerido'}; if (!v.includes('@') || !v.includes('.')) return {ok:false,msg:'Formato incorrecto'}; return {ok:true,msg:''}; },
    tel:    function(v) { if (!v) return {ok:false,msg:'Requerido'}; var c = v.replace(/[\s\-\(\)\+]/g,''); if (c.length < 7 || isNaN(c)) return {ok:false,msg:'Solo números'}; return {ok:true,msg:''}; },
    ciudad: function(v) { return v ? {ok:true,msg:''} : {ok:false,msg:'Requerido'}; },
    deporte:function(v) { return v ? {ok:true,msg:''} : {ok:false,msg:'Requerido'}; }
  };

  function onDeporteChange(sel) {
    var wrap = document.getElementById('otros-wrap');
    var otrosInput = document.getElementById('f-deporte-otros');
    if (sel.value === 'Otros') {
      wrap.style.display = 'block';
      otrosInput.value = '';
      otrosInput.classList.remove('ok','error');
    } else {
      wrap.style.display = 'none';
      otrosInput.value = '';
    }
    vf(sel, 'deporte');
  }

  function vfOtros(input) {
    var hint = document.getElementById('h-deporte');
    input.classList.toggle('error', input.value.length === 0);
    input.classList.toggle('ok', input.value.length > 0);
    if (!input.value) { hint.textContent = 'Escribe tu deporte'; hint.className = 'field-hint show error'; }
    else { hint.textContent = ''; hint.className = 'field-hint'; }
  }

  function vf(input, key) {
    var res = validators[key](input.value);
    var hint = document.getElementById('h-' + key);
    input.classList.toggle('error', !res.ok && input.value.length > 0);
    input.classList.toggle('ok', res.ok && input.value.length > 0);
    if (input.value && !res.ok) { hint.textContent = res.msg; hint.className = 'field-hint show error'; }
    else { hint.textContent = ''; hint.className = 'field-hint'; }
  }

  function submitForm() {
    var fields = ['nombre','mail','tel','ciudad'];
    var allOk = true;
    fields.forEach(function(k) {
      var el = document.getElementById('f-' + k);
      var res = validators[k](el.value);
      if (!res.ok) { el.classList.add('error'); var h = document.getElementById('h-' + k); h.textContent = res.msg || 'Requerido'; h.className = 'field-hint show error'; allOk = false; }
    });
    var deporteSel2 = document.getElementById('f-deporte').value;
    if (!deporteSel2) {
      var h = document.getElementById('h-deporte');
      h.textContent = 'Requerido'; h.className = 'field-hint show error';
      allOk = false;
    }
    if (!allOk) return;

    var nombre  = document.getElementById('f-nombre').value;
    var mail    = document.getElementById('f-mail').value;
    var tel     = document.getElementById('f-tel').value;
    var ciudad  = document.getElementById('f-ciudad').value;
    var deporteSel = document.getElementById('f-deporte').value;
    var deporte = deporteSel === 'Otros' ? document.getElementById('f-deporte-otros').value : deporteSel;

    var btn = document.querySelector('.btn-submit');
    btn.textContent = 'ENVIANDO...'; btn.disabled = true; btn.style.opacity = '0.6';

    var params = '?nombre=' + encodeURIComponent(nombre) + '&mail=' + encodeURIComponent(mail) + '&tel=' + encodeURIComponent(tel) + '&ciudad=' + encodeURIComponent(ciudad) + '&deporte=' + encodeURIComponent(deporte);

    fetch(SHEET_URL + params)
    .then(function() { onSuccess(nombre, mail, tel, ciudad, deporte); })
    .catch(function() { onSuccess(nombre, mail, tel, ciudad, deporte); })
    .finally(function() { btn.textContent = 'ENVIAR'; btn.disabled = false; btn.style.opacity = '1'; });
  }

  function onSuccess(nombre, mail, tel, ciudad, deporte) {
    document.getElementById('sd-nombre').textContent = nombre;
    document.getElementById('sd-mail').textContent   = mail;
    document.getElementById('sd-tel').textContent    = tel;
    document.getElementById('sd-ciudad').textContent = ciudad;
    document.getElementById('sd-deporte').textContent= deporte;
    participants.push({nombre: nombre, id: String(participants.length + 1).padStart(3,'0')});
    document.getElementById('f-deporte').selectedIndex = 0;
    document.getElementById('f-deporte-otros').value = '';
    document.getElementById('otros-wrap').style.display = 'none';
    ['nombre','mail','tel','ciudad'].forEach(function(k) {
      var el = document.getElementById('f-' + k);
      el.value = ''; el.classList.remove('ok','error');
      document.getElementById('h-' + k).className = 'field-hint';
    });
    navigate('screen-success');
  }
</script>
</body>
</html>
